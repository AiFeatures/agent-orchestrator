#
# CI entrypoint — delegates to enterprise-ci-cd reusable workflows.
# Wave 2 hardening: BACKLOG.md P0 — ci-adoption theme.
#
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  node:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/ci-node.yml@v1
    with:
      package-manager: pnpm
      lint-command: lint
      test-command: test
      build-command: build
      coverage-threshold: 0
      run-dependency-review: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build all non-web packages
      - run: pnpm -r --filter '!@aoagents/ao-web' build
      # Typecheck all non-web packages
      - run: pnpm -r --filter '!@aoagents/ao-web' typecheck
      # Build web (Next.js build includes its own typecheck)
      - run: pnpm --filter @aoagents/ao-web build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@aoagents/ao-web' build
      - run: pnpm test

  test-web:
    name: Test (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Start tmux server
        run: tmux start-server
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@aoagents/ao-web' build
      - name: Run web server tests (unit + integration)
        run: pnpm --filter @aoagents/ao-web exec vitest run server/__tests__/
